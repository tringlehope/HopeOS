# #######################################################################################
# FULL HYPRLAND CONFIG - PERSONALIZED & CLEANED
# #######################################################################################

################
### MONITORS ###
################
monitor=HDMI-A-2,1680x1050@59.95,1587x1333,1.0
monitor=DP-5,2560x1440@165.0,3267x820,1.0


###################
### MY PROGRAMS ###
###################
$terminal = kitty
$fileManager = nemo
$menu = pkill rofi || rofi -show drun

#################
### AUTOSTART ###
#################
exec-once = waybar & /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 & mako
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = tg-ws-proxy
exec-once = swaybg -i /home/tringlehope/systemdv/wall.png -m fill
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 5
    gaps_out = 8
    border_size = 4

    col.active_border = rgba(5e81acff)
    col.inactive_border = rgba(2e3440ff)

    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 8

    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = false
        range = 15
        render_power = 3
        color = rgba(00000044)
    }

    blur {
        enabled = false
        size = 6
        passes = 3
    }
}

animations {
    enabled = true
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 2.5, md3_decel
    animation = workspaces, 1, 3.5, easeOutExpo, slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = true
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    vfr = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle

    follow_mouse = 1
    accel_profile = flat
    sensitivity = 0
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, W, exec, $menu
bind = $mainMod, V, togglefloating,

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = SUPER_SHIFT, S, exec, grimblast copy area

bind = $mainMod, mouse_down, workspace, m-1
bind = $mainMod, mouse_up, workspace, m+1

bind = $mainMod, Z, exec, kitty --hold zapret

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = CTRL SUPER ALT, 1, exec, swaybg -i /home/tringlehope/systemdv/wall.png -m fill
bind = CTRL SUPER ALT, 2, exec, swaybg -i /home/tringlehope/systemdv/wall2.png -m fill
bind = CTRL SUPER ALT, 3, exec, swaybg -i /home/tringlehope/systemdv/wall3.svg -m fill
bind = CTRL SUPER ALT, 4, exec, swaybg -i /home/tringlehope/systemdv/wall4.jpg -m fill
bind = CTRL SUPER ALT, 5, exec, swaybg -i /home/tringlehope/systemdv/wall5.jpeg -m fill
bind = CTRL SUPER ALT, 6, exec, swaybg -i /home/tringlehope/systemdv/wall6.jpg -m fill
bind = CTRL SUPER ALT, 7, exec, swaybg -i /home/tringlehope/systemdv/wall7.jpg -m fill
bind = CTRL SUPER ALT, 8, exec, swaybg -i /home/tringlehope/systemdv/wall8.jpg -m fill
bind = CTRL SUPER ALT, 9, exec, swaybg -i /home/tringlehope/systemdv/wall9.jpg -m fill
bind = CTRL SUPER ALT, 0, exec, swaybg -i /home/tringlehope/systemdv/wall0.png -m fill

workspace = 1, monitor:DP-5
workspace = 3, monitor:DP-5
workspace = 4, monitor:DP-5
workspace = 5, monitor:DP-5
workspace = 6, monitor:DP-5
workspace = 7, monitor:DP-5
workspace = 8, monitor:DP-5
workspace = 9, monitor:DP-5
workspace = 10, monitor:HDMI-A-2

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
allow_tearing = false

bind = $mainMod, O, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

binds {
    scroll_event_delay = 0
}
#workspace = w[t1], gapsout:0, gapsin:0
#workspace = w[tg1], gapsout:0, gapsin:0
#workspace = f[1], gapsout:0, gapsin:0
#windowrule = borderwidth 0, floating:0, onworkspace:w[t1]
#windowrule = rounding 0, floating:0, onworkspace:w[t1]
#windowrule = borderwidth 0, floating:0, onworkspace:w[tg1]
#windowrule = rounding 0, floating:0, onworkspace:w[tg1]
workspace = w[t1], gapsin:0, gapsout:0, border:false, rounding:false
